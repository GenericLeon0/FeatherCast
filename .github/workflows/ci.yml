name: CI

permissions:
  contents: read

concurrency:
  group: feathercast-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        shell: pwsh
        env:
          EXPECTED_PUBLISHER: ${{ vars.FEATHERCAST_EXPECTED_PUBLISHER }}
          SIGNER_THUMBPRINTS: ${{ vars.FEATHERCAST_ALLOWED_SIGNER_THUMBPRINTS }}
        run: |
          cmake -S . -B build-native -A x64 `
            -DFEATHERCAST_WARNINGS_AS_ERRORS=ON `
            "-DFEATHERCAST_EXPECTED_PUBLISHER=$env:EXPECTED_PUBLISHER" `
            "-DFEATHERCAST_ALLOWED_SIGNER_THUMBPRINTS=$env:SIGNER_THUMBPRINTS"

      - name: Build Debug
        run: cmake --build build-native --config Debug

      - name: Test Debug
        run: ctest --test-dir build-native -C Debug --output-on-failure

      - name: Build Release
        run: cmake --build build-native --config Release

      - name: Test Release
        run: ctest --test-dir build-native -C Release --output-on-failure

      - name: Verify search performance
        run: |
          build-native\Release\FeatherCastSearchBenchmarks.exe
          build-native\Release\FeatherCastFileSearchBenchmarks.exe

      - name: Verify self-contained runtime and startup
        shell: pwsh
        run: |
          function Invoke-SelfTest([string]$Path, [string]$Label) {
            $selfTest = Start-Process $Path -ArgumentList '--self-test' -PassThru -Wait
            if ($selfTest.ExitCode -ne 0) {
              throw "$Label self-test failed with exit code $($selfTest.ExitCode)."
            }
          }

          $dumpbin = Get-ChildItem "$env:ProgramFiles\Microsoft Visual Studio" `
            -Recurse -Filter dumpbin.exe -ErrorAction Stop |
            Where-Object FullName -Match 'Hostx64\\x64\\dumpbin\.exe$' |
            Select-Object -First 1
          if (-not $dumpbin) { throw "Unable to locate dumpbin.exe." }
          foreach ($file in @(
            "build-native\Release\FeatherCast.exe",
            "build-native\Release\FeatherCastPluginHost.exe"
          )) {
            $dependencies = & $dumpbin.FullName /dependents $file | Out-String
            if ($dependencies -match '(?im)^\s+(MSVCP|VCRUNTIME)[^\s]*\.dll\s*$') {
              throw "$file depends on a dynamic MSVC runtime."
            }
          }
          Invoke-SelfTest 'build-native\Release\FeatherCast.exe' 'FeatherCast'
          Invoke-SelfTest 'build-native\Release\FeatherCastPluginHost.exe' 'Plugin host'

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $cmake = Get-Content CMakeLists.txt -Raw
          if ($cmake -notmatch 'project\(FeatherCastNative VERSION ([0-9]+\.[0-9]+\.[0-9]+)') {
            throw "Unable to read the CMake project version."
          }
          $projectVersion = $Matches[1]
          $tagVersion = '${{ github.ref_name }}'.TrimStart('v')
          if ($projectVersion -ne $tagVersion) {
            throw "Tag version $tagVersion does not match CMake project version $projectVersion."
          }

      - name: Determine signing mode
        if: startsWith(github.ref, 'refs/tags/v')
        id: signing
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          EXPECTED_PUBLISHER: ${{ vars.FEATHERCAST_EXPECTED_PUBLISHER }}
          SIGNER_THUMBPRINTS: ${{ vars.FEATHERCAST_ALLOWED_SIGNER_THUMBPRINTS }}
        run: |
          $values = @(
            $env:CERTIFICATE_BASE64,
            $env:CERTIFICATE_PASSWORD,
            $env:EXPECTED_PUBLISHER,
            $env:SIGNER_THUMBPRINTS
          )
          $configured = @($values | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }).Count
          if ($configured -ne 0 -and $configured -ne $values.Count) {
            throw "Release signing is only partially configured. Configure all certificate secrets and publisher variables, or none of them."
          }
          $enabled = if ($configured -eq $values.Count) { 'true' } else { 'false' }
          "enabled=$enabled" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          if ($enabled -eq 'false') {
            Write-Warning "Publishing unsigned release artifacts. In-app installation remains disabled for builds without signer pins."
          }

      - name: Prepare signing certificate
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        run: |
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\feathercast-signing.pfx",
            [Convert]::FromBase64String($env:CERTIFICATE_BASE64))

      - name: Sign application binaries
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificate = "$env:RUNNER_TEMP\feathercast-signing.pfx"
          foreach ($file in @(
            "build-native\Release\FeatherCast.exe",
            "build-native\Release\FeatherCastPluginHost.exe"
          )) {
            signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
              /f $certificate /p $env:CERTIFICATE_PASSWORD $file
            signtool verify /pa /v $file
          }

      - name: Verify signed application identities
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          EXPECTED_PUBLISHER: ${{ vars.FEATHERCAST_EXPECTED_PUBLISHER }}
          SIGNER_THUMBPRINTS: ${{ vars.FEATHERCAST_ALLOWED_SIGNER_THUMBPRINTS }}
        run: |
          $pins = @($env:SIGNER_THUMBPRINTS.Split(';') |
            ForEach-Object { ($_ -replace '[^0-9A-Fa-f]', '').ToLowerInvariant() } |
            Where-Object { $_ })
          foreach ($file in @(
            "build-native\Release\FeatherCast.exe",
            "build-native\Release\FeatherCastPluginHost.exe"
          )) {
            $signature = Get-AuthenticodeSignature $file
            if ($signature.Status -ne 'Valid' -or -not $signature.SignerCertificate) {
              throw "$file does not have a valid Authenticode signature."
            }
            if (-not $signature.TimeStamperCertificate) {
              throw "$file does not have an Authenticode timestamp."
            }
            $publisher = $signature.SignerCertificate.GetNameInfo(
              [Security.Cryptography.X509Certificates.X509NameType]::SimpleName, $false)
            if ($publisher -ne $env:EXPECTED_PUBLISHER) {
              throw "$file publisher '$publisher' does not match '$env:EXPECTED_PUBLISHER'."
            }
            $pin = [Convert]::ToHexString(
              [Security.Cryptography.SHA256]::HashData($signature.SignerCertificate.RawData)
            ).ToLowerInvariant()
            if ($pin -notin $pins) { throw "$file signer certificate is not pinned." }
          }

      - name: Retain release symbols
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: FeatherCast-${{ github.ref_name }}-symbols
          if-no-files-found: error
          retention-days: 365
          path: |
            build-native/Release/FeatherCast.pdb
            build-native/Release/FeatherCastPluginHost.pdb

      - name: Install NSIS
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          choco install nsis --yes --no-progress --limit-output
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) { throw "NSIS installation did not provide makensis.exe." }

      - name: Package
        if: startsWith(github.ref, 'refs/tags/v')
        run: cpack --config build-native/CPackConfig.cmake -C Release

      - name: Sign installer
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificate = "$env:RUNNER_TEMP\feathercast-signing.pfx"
          $installer = Get-ChildItem FeatherCast-*-win64.exe | Select-Object -First 1
          signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com `
            /f $certificate /p $env:CERTIFICATE_PASSWORD $installer.FullName
          signtool verify /pa /v $installer.FullName

      - name: Verify signed installer identity
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          EXPECTED_PUBLISHER: ${{ vars.FEATHERCAST_EXPECTED_PUBLISHER }}
          SIGNER_THUMBPRINTS: ${{ vars.FEATHERCAST_ALLOWED_SIGNER_THUMBPRINTS }}
        run: |
          $installer = Get-ChildItem FeatherCast-*-win64.exe | Select-Object -First 1
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne 'Valid' -or -not $signature.SignerCertificate -or
              -not $signature.TimeStamperCertificate) {
            throw "Installer signature or timestamp is invalid."
          }
          $publisher = $signature.SignerCertificate.GetNameInfo(
            [Security.Cryptography.X509Certificates.X509NameType]::SimpleName, $false)
          if ($publisher -ne $env:EXPECTED_PUBLISHER) {
            throw "Installer publisher '$publisher' does not match '$env:EXPECTED_PUBLISHER'."
          }
          $pin = [Convert]::ToHexString(
            [Security.Cryptography.SHA256]::HashData($signature.SignerCertificate.RawData)
          ).ToLowerInvariant()
          $pins = @($env:SIGNER_THUMBPRINTS.Split(';') |
            ForEach-Object { ($_ -replace '[^0-9A-Fa-f]', '').ToLowerInvariant() } |
            Where-Object { $_ })
          if ($pin -notin $pins) { throw "Installer signer certificate is not pinned." }

      - name: Smoke-test installer
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          function Invoke-SelfTest([string]$Path, [string]$Label) {
            $selfTest = Start-Process $Path -ArgumentList '--self-test' -PassThru -Wait
            if ($selfTest.ExitCode -ne 0) {
              throw "$Label self-test failed with exit code $($selfTest.ExitCode)."
            }
          }

          $installer = Get-ChildItem FeatherCast-*-win64.exe | Select-Object -First 1
          if (-not $installer) { throw "NSIS installer was not generated." }

          # Exercise a real in-place upgrade when a published predecessor exists.
          $previousTag = $null
          $releaseJson = gh release list --exclude-drafts --exclude-pre-releases `
            --limit 20 --json tagName 2>&1
          if ($LASTEXITCODE -eq 0) {
            $previousTag = $releaseJson |
              ConvertFrom-Json |
              Where-Object tagName -ne '${{ github.ref_name }}' |
              Select-Object -ExpandProperty tagName -First 1
          } else {
            Write-Warning "Unable to list previous releases; running a clean-install smoke test. $releaseJson"
          }
          if ($previousTag) {
            $previousDirectory = Join-Path $env:RUNNER_TEMP 'previous-release'
            New-Item -ItemType Directory -Force $previousDirectory | Out-Null
            $downloaded = $false
            for ($attempt = 1; $attempt -le 3; $attempt++) {
              Get-ChildItem $previousDirectory -File -ErrorAction SilentlyContinue |
                Remove-Item -Force
              $downloadOutput = gh release download $previousTag `
                --pattern 'FeatherCast-*-win64.exe' --dir $previousDirectory 2>&1
              if ($LASTEXITCODE -eq 0) {
                $downloaded = $true
                break
              }
              Write-Warning "Previous release download attempt $attempt failed. $downloadOutput"
              if ($attempt -lt 3) { Start-Sleep -Seconds ([Math]::Pow(2, $attempt)) }
            }
            $previousInstaller = Get-ChildItem $previousDirectory -Filter 'FeatherCast-*-win64.exe' |
              Select-Object -First 1
            if ($downloaded -and $previousInstaller) {
              $previousProcess = Start-Process $previousInstaller.FullName -ArgumentList '/S' -PassThru -Wait
              if ($previousProcess.ExitCode -ne 0) {
                throw "Previous installer failed with exit code $($previousProcess.ExitCode)."
              }
            } else {
              Write-Warning "Previous release $previousTag is unavailable; running a clean-install smoke test."
            }
          }

          $settingsRoot = Join-Path $env:APPDATA 'FeatherCast'
          $pluginsRoot = Join-Path $settingsRoot 'plugins\upgrade-smoke-plugin'
          $localRoot = Join-Path $env:LOCALAPPDATA 'FeatherCast'
          New-Item -ItemType Directory -Force $pluginsRoot | Out-Null
          New-Item -ItemType Directory -Force $localRoot | Out-Null
          $preservedFiles = @(
            (Join-Path $settingsRoot 'settings.json'),
            (Join-Path $settingsRoot 'snippets.json'),
            (Join-Path $pluginsRoot 'manifest.json'),
            (Join-Path $localRoot 'installer-upgrade-marker.dat')
          )
          Set-Content -Encoding utf8 $preservedFiles[0] '{"schemaVersion":1}'
          Set-Content -Encoding utf8 $preservedFiles[1] '{"snippets":[]}'
          Set-Content -Encoding utf8 $preservedFiles[2] '{"name":"Upgrade Smoke Plugin"}'
          Set-Content -Encoding ascii $preservedFiles[3] 'preserve-local-data'
          $preservedHashes = @{}
          foreach ($preservedFile in $preservedFiles) {
            $preservedHashes[$preservedFile] = (Get-FileHash $preservedFile -Algorithm SHA256).Hash
          }

          $process = Start-Process $installer.FullName -ArgumentList '/S' -PassThru -Wait
          if ($process.ExitCode -ne 0) { throw "Installer failed with exit code $($process.ExitCode)." }
          $installRoot = Join-Path $env:ProgramFiles 'FeatherCast'
          $app = Join-Path $installRoot 'bin\FeatherCast.exe'
          $uninstaller = Join-Path $installRoot 'Uninstall.exe'
          if (-not (Test-Path $app)) { throw "Installed FeatherCast.exe was not found." }
          if (-not (Test-Path $uninstaller)) { throw "Uninstaller was not found." }
          foreach ($preservedFile in $preservedFiles) {
            if (-not (Test-Path $preservedFile)) {
              throw "Upgrade removed user data: $preservedFile"
            }
            if ((Get-FileHash $preservedFile -Algorithm SHA256).Hash -ne $preservedHashes[$preservedFile]) {
              throw "Upgrade changed user data: $preservedFile"
            }
          }
          Invoke-SelfTest $app 'Installed FeatherCast'
          $pluginHost = Join-Path $installRoot 'bin\FeatherCastPluginHost.exe'
          if (-not (Test-Path $pluginHost)) { throw "Installed plugin host was not found." }
          Invoke-SelfTest $pluginHost 'Installed plugin host'

          $zip = Get-ChildItem FeatherCast-*-win64.zip | Select-Object -First 1
          $portableRoot = Join-Path $env:RUNNER_TEMP 'portable-release'
          Expand-Archive $zip.FullName $portableRoot -Force
          $portableApp = Get-ChildItem $portableRoot -Recurse -Filter FeatherCast.exe |
            Select-Object -First 1
          $portableHost = Get-ChildItem $portableRoot -Recurse -Filter FeatherCastPluginHost.exe |
            Select-Object -First 1
          if (-not $portableApp -or -not $portableHost) {
            throw "Portable release binaries were not found."
          }
          Invoke-SelfTest $portableApp.FullName 'Portable FeatherCast'
          Invoke-SelfTest $portableHost.FullName 'Portable plugin host'

          $uninstallRoots = @(
            'HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall',
            'HKCU:\Software\Microsoft\Windows\CurrentVersion\Uninstall'
          )
          $identities = @($uninstallRoots | ForEach-Object {
            Get-ChildItem $_ -ErrorAction SilentlyContinue |
              Where-Object PSChildName -eq 'FeatherCast'
          })
          if ($identities.Count -ne 1) {
            throw "Expected one FeatherCast uninstall identity after upgrade; found $($identities.Count)."
          }

          $uninstall = Start-Process $uninstaller -ArgumentList '/S' -PassThru -Wait
          if ($uninstall.ExitCode -ne 0) { throw "Uninstaller failed with exit code $($uninstall.ExitCode)." }
          if (Test-Path $installRoot) { throw "Installation directory remains after uninstall." }
          foreach ($preservedFile in $preservedFiles) {
            if (-not (Test-Path $preservedFile)) {
              throw "Uninstall removed user data: $preservedFile"
            }
            if ((Get-FileHash $preservedFile -Algorithm SHA256).Hash -ne $preservedHashes[$preservedFile]) {
              throw "Uninstall changed user data: $preservedFile"
            }
          }

      - name: Generate SHA-256 sidecars
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          foreach ($f in Get-ChildItem FeatherCast-*-win64.exe, FeatherCast-*-win64.zip) {
            "$((Get-FileHash $f -Algorithm SHA256).Hash.ToLowerInvariant())  $($f.Name)" |
              Set-Content -Encoding ascii "$($f.FullName).sha256"
          }

      - name: Retain release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: FeatherCast-${{ github.ref_name }}-release
          if-no-files-found: error
          retention-days: 30
          path: |
            FeatherCast-*-win64.exe
            FeatherCast-*-win64.zip
            FeatherCast-*-win64.*.sha256

  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: FeatherCast-${{ github.ref_name }}-release
          path: release-assets

      # Draft release: the in-app updater ignores drafts; publish manually after verifying.
      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          $assets = @(Get-ChildItem release-assets -File)
          $assetPaths = @($assets | ForEach-Object FullName)
          $tag = '${{ github.ref_name }}'
          $releaseJson = gh api "repos/$env:GH_REPO/releases?per_page=100"
          if ($LASTEXITCODE -ne 0) { throw "Unable to inspect existing GitHub releases." }
          $matchingReleases = @($releaseJson |
            ConvertFrom-Json |
            Where-Object tag_name -eq $tag)

          if ($matchingReleases.Count -gt 1) {
            $ids = $matchingReleases | ForEach-Object id
            throw "Multiple releases already use tag $tag (IDs: $($ids -join ', ')). Remove the duplicate drafts and rerun this job."
          }
          if ($matchingReleases.Count -eq 1) {
            gh release upload $tag @assetPaths --clobber
            if ($LASTEXITCODE -ne 0) { throw "Unable to update the existing draft release for $tag." }
          } else {
            gh release create $tag --draft --generate-notes @assetPaths
            if ($LASTEXITCODE -ne 0) { throw "Unable to create the draft release for $tag." }
          }
